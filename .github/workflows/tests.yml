name: Tests

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

jobs:
  discordbot:
    name: Discord Bot Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/discordbot

    env:
      DISCORD_BOT_TOKEN: "test"
      INTERNAL_API_KEY: "test"
      FRONTEND_URL: "http://localhost:5173"
      APP_HOST: "localhost"
      APP_PORT: "8080"
      BACKEND_HOST: "http://localhost:8000"
      CORS_ALLOWED_ORIGINS: '["http://localhost:5173"]'
      DEBUG: "True"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/discordbot/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: discordbot

  dj-backend:
    name: DJ Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dj-backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U test_user -d test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: "github-actions-test-secret-key"
      DEBUG: "True"
      BACKEND_URL: "http://localhost:8000"
      FRONTEND_URL: "http://localhost:3000"
      ALLOWED_HOSTS: '["localhost", "127.0.0.1", "dj-backend", "nginx"]'
      CORS_ALLOWED_ORIGINS: '["http://localhost:3000", "http://localhost:5173"]'
      DISCORD_CLIENT_SECRET: "test"
      DISCORD_CLIENT_ID: "123"
      INTERNAL_API_KEY: "test"
      DISCORD_OAUTH_REDIRECT_URL: "http://localhost:3000/dj"
      DJANGO_ADMIN_USERNAME: "admin"
      DJANGO_ADMIN_PASSWORD: "test_admin_password"
      DB_HOST: "localhost"
      DB_PORT: "5432"
      DB_NAME: "test_db"
      DB_USER: "test_user"
      DB_PASSWORD: "test_password"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/dj-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          coverage run src/manage.py test src
          coverage xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: dj-backend
