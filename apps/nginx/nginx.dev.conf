upstream frontend {
    server react-frontend:5173;
}

upstream dj_backend {
    server dj-backend:8000;
}

upstream discordbot {
    server discordbot:8080;
}

server {
    listen 80;

    # Frontend + Vite HMR (for hot reload in dev)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # DJ Backend
    location /dj/ {
        proxy_pass http://dj_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Discord Bot HTTP
    location /bot/ {
        proxy_pass http://discordbot/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Discord Bot WebSocket
    location /ws {
        proxy_pass http://discordbot;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
