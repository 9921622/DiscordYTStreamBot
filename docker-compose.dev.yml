services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./apps/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    networks:
      - app-network

  discordbot:
    build:
      context: ./apps/discordbot
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - ./apps/discordbot/.env
    environment:
      - DEBUG=${DEBUG}
      - CORS_ALLOWED_ORIGINS=["${HOST_ADDR}"]
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ./apps/discordbot:/app
    ports:
      - "8080:8080"
    networks:
      - app-network

  dj-backend:
    build:
      context: ./apps/dj-backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - ./apps/dj-backend/.env
    environment:
      - DEBUG=${DEBUG}
      - ALLOWED_HOSTS=["${HOST_ADDR}", "dj-backend", "nginx", "localhost"]
      - CORS_ALLOWED_ORIGINS=["${HOST_ADDR}", "http://localhost:3000"]
      - FRONTEND_URL=${HOST_ADDR}
      - DJANGO_ADMIN_USERNAME=${DJANGO_ADMIN_USERNAME}
      - DJANGO_ADMIN_PASSWORD=${DJANGO_ADMIN_PASSWORD}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - INTERNAL_API_KEY=${INTERNAL_API_KEY}
    volumes:
      - ./apps/dj-backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  react-frontend:
    build:
      context: ./apps/react-frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    volumes:
      - ./apps/react-frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - discordbot
      - dj-backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./apps/nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - react-frontend
      - dj-backend
      - discordbot
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
