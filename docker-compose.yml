services:

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./apps/postgresql:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  discordbot:
    build:
      context: ./apps/discordbot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/discordbot/.env
    environment:
      - DEBUG=$DEBUG
      - CORS_ALLOWED_ORIGINS=["${HOST_ADDR}"]
    networks:
      - app-network

  dj-backend:
    build:
      context: ./apps/dj-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/dj-backend/.env
    environment:
      - DEBUG=$DEBUG
      - ALLOWED_HOSTS=["${HOST_ADDR}", "dj-backend","nginx"] 
      - CORS_ALLOWED_ORIGINS=["${HOST_ADDR}"]
      - FRONTEND_URL=${HOST_ADDR}
      - DISCORD_OAUTH_REDIRECT_URL=${HOST_ADDR}/dj
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - app-network

  react-frontend:
    build:
      context: ./apps/react-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - discordbot
      - dj-backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./apps/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react-frontend
      - dj-backend
      - discordbot
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
