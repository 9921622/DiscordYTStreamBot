services:
  discordbot:
    build:
      context: ./apps/discordbot
      dockerfile: Dockerfile
    restart: unless-stopped

    env_file:
      - ./apps/discordbot/.env
    networks:
      - app-network

  dj-backend:
    build:
      context: ./apps/dj-backend
      dockerfile: Dockerfile
    restart: unless-stopped

    env_file:
      - ./apps/dj-backend/.env
    networks:
      - app-network

  react-frontend:
    build:
      context: ./apps/react-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    
    depends_on:
      - discordbot
      - dj-backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:80"
    volumes:
      - ./apps/nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - react-frontend
      - dj-backend
      - discordbot
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
