services:
  discordbot:
    build:
      context: ./apps/discordbot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/discordbot/.env
    environment:
      - CORS_ALLOWED_ORIGINS=["http://${HOST_IP}:${HOST_PORT}"]
    networks:
      - app-network

  dj-backend:
    build:
      context: ./apps/dj-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./apps/dj-backend/.env
    environment:
      - ALLOWED_HOSTS=["${HOST_IP}","dj-backend","nginx"]
      - CORS_ALLOWED_ORIGINS=["http://${HOST_IP}:${HOST_PORT}"]
      - FRONTEND_URL=http://${HOST_IP}:${HOST_PORT}
      - DISCORD_OAUTH_REDIRECT_URL=http://${HOST_IP}:${HOST_PORT}/dj
    networks:
      - app-network

  react-frontend:
    build:
      context: ./apps/react-frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - discordbot
      - dj-backend
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HOST_PORT}:80"
    environment:
      - HOST_PORT=${HOST_PORT}
    command: >
      sh -c "envsubst '$$HOST_PORT' < /etc/nginx/templates/nginx.prod.conf
      > /etc/nginx/conf.d/default.conf && nginx -g 'daemon off;'"
    volumes:
      - ./apps/nginx/nginx.prod.conf:/etc/nginx/templates/nginx.prod.conf:ro
    depends_on:
      - react-frontend
      - dj-backend
      - discordbot
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
